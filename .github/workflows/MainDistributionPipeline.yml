#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: Tmonster/extension-ci-tools/.github/workflows/_extension_distribution.yml@fix_vcpkg_ports_for_avro_c
    with:
      extension_name: iceberg
      duckdb_version: d4b767e2de0ce8c715d1dfdcd375c98eadc9e152
      ci_tools_version: fix_vcpkg_ports_for_avro_c
      exclude_archs: 'windows_amd64_mingw'
      extra_toolchains: 'python3'

  duckdb-stable-deploy:
    name: Deploy extension binaries
    needs: duckdb-stable-build
    uses: Tmonster/extension-ci-tools/.github/workflows/_extension_deploy.yml@fix_vcpkg_ports_for_avro_c
    secrets: inherit
    with:
      extension_name: iceberg
      duckdb_version: d4b767e2de0ce8c715d1dfdcd375c98eadc9e152
      ci_tools_version: fix_vcpkg_ports_for_avro_c
      exclude_archs: 'windows_amd64_mingw'
      deploy_latest: ${{ startsWith(github.ref, 'refs/heads/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/heads/v') || github.ref == 'refs/heads/main' }}
