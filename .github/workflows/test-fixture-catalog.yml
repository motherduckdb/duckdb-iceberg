name: Test Fixture Catalog Reusable
on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the DuckDB-Iceberg artifact to download"
        required: true
        type: string
      local-extension-repo:
        description: "Path to set as LOCAL_EXTENSION_REPO environment variable"
        required: false
        type: string
        default: ""

jobs:
  test-spark:
    name: Test against fixture catalog
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY_PUBLIC: http://localhost:8878

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Download DuckDB-Iceberg artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: build/release

      - name: Restore permissions
        run: |
          find ./build/release -type f -name 'duckdb*' -exec chmod +x {} \;
          find ./build/release -type f -name 'unittest*' -exec chmod +x {} \;

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Install fixture catalog dependencies
        run: |
          sudo apt update -y -qq
          sudo apt install -y -qq python3-venv tar pkg-config

      - name: Install CMake 3.x
        run: |
          sudo apt-get remove -y cmake cmake-data
          sudo apt-get install --allow-downgrades -y -qq 'cmake=3.*' 'cmake-data=3.*'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup fixture
        run: |
          make fixture-data

      - name: Run mitmproxy
        shell: bash
        run: |
          source .venv-spark4/bin/activate
          mitmdump --mode regular@8878 --flow-detail 2 > mitmproxy.log 2>&1 &

      - name: Install Iceberg & Run Generic Tests Set local extension repo, Install iceberg from build/release/extension and remove require iceberg from tests
        if: inputs.local-extension-repo != ''
        env:
          CATALOG_TEST_CONFIG_SETUP: 1
          FIXTURE_SERVER_AVAILABLE: 1
        run: |
          # remove already installed extension if it is installed
          rm ~/.duckdb/extensions/**/**/iceberg.* || true
          echo "LOCAL_EXTENSION_REPO=${{ inputs.local-extension-repo }}" >> $GITHUB_ENV
          # check that we can load the extension
          ./build/release/duckdb -unsigned -c \
            "LOAD 'build/release/extension/iceberg/iceberg.duckdb_extension'; \
             INSTALL 'build/release/extension/iceberg/iceberg.duckdb_extension'; \
             LOAD 'build/release/extension/tpch/tpch.duckdb_extension'; \
             INSTALL 'build/release/extension/tpch/tpch.duckdb_extension'; \
             FROM duckdb_extensions() where extension_name in ('iceberg', 'tpch');"
          # remove require iceberg from tests
          grep -rl "require iceberg" test/sql/ | xargs sed -i '/^require iceberg$/d'
          # not sure why this is needed. Apparently tpch is also not linked
          grep -rl "require tpch" test/sql/ | xargs sed -i '/^require tpch$/d'
          ./build/release/test/unittest --order lex "$PWD/test/sql/local/catalog_test_config_setup/*" --list-test-names-only || true
          ./build/release/test/unittest --order lex "$PWD/test/sql/local/catalog_test_config_setup/*" --test-config test/configs/fixture.json --autoloading available

      - name: Run Generic IRC tests
        if: inputs.local-extension-repo == ''
        env:
          CATALOG_TEST_CONFIG_SETUP: 1
          FIXTURE_SERVER_AVAILABLE: 1
        run: |
          ./build/release/test/unittest --order lex "$PWD/test/sql/local/catalog_test_config_setup/*" --list-test-names-only || true
          ./build/release/test/unittest --order lex "$PWD/test/sql/local/catalog_test_config_setup/*" --test-config test/configs/fixture.json

      - name: Run other tests
        if: inputs.local-extension-repo == ''
        env:
          FIXTURE_SERVER_AVAILABLE: 1
        run: |
          ./build/release/test/unittest --order lex "$PWD/test/*" --list-test-names-only || true
          ./build/release/test/unittest --order lex "$PWD/test/*"

      - name: Test reads with PyIceberg
        if: inputs.local-extension-repo == ''
        env:
          FIXTURE_SERVER_AVAILABLE: 1
        run: |
          # test with spark v4
          source .venv-spark4/bin/activate
          python3 -m pytest test/python
          deactivate
          # test with spark v3
          python3 -m venv .venv-spark3
          source .venv-spark3/bin/activate
          python3 -m pip install pyspark==3.5.2 pytest pyiceberg==0.9.1 pyarrow pydantic==2.9.0
          python3 -m pytest test/python

      - name: Run all duckdb/duckdb tests
        if: inputs.local-extension-repo == ''
        run: |
          ./build/release/test/unittest --order lex --test-dir duckdb "test/sql/*" --list-test-names-only || true
          ./build/release/test/unittest --order lex --test-dir duckdb "test/sql/*" --test-config test/configs/fixture_duckdb_tests.json
